<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoma Partner Product Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C896;
    --green-dark: #009E78;
    --green-pale: #E8FBF5;
    --navy: #0C1C30;
    --slate: #4B6A85;
    --slate-light: #8AAABB;
    --border: #DDE8EF;
    --bg: #F5F8FA;
    --white: #FFFFFF;
    --text: #0C1C30;
    --text-soft: #4B6A85;

    --yoid: #6C63FF;
    --yoid-dark: #3B2FBF;
    --yoid-pale: #F0EFFE;
    --yoid-border: #C5BFFF;

    --yoma-dark: #007A5C;
    --yoma-pale: #E8FBF5;
    --yoma-border: #8FE8CF;

    --ex: #F59E0B;
    --ex-dark: #B45309;
    --ex-pale: #FFFBEB;
    --ex-border: #FCD34D;

    --strong-bg: #DCFCE7; --strong: #15803D;
    --good-bg: #DBEAFE;   --good: #1D4ED8;
    --mod-bg: #FEF3C7;    --mod: #B45309;
    --no-bg: #FEE2E2;     --no: #B91C1C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .shell { max-width: 720px; margin: 0 auto; padding: 52px 24px 100px; }

  /* Header */
  .header { margin-bottom: 44px; }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--green-pale); color: var(--green-dark);
    font-size: 11px; font-weight: 700; letter-spacing: .11em;
    text-transform: uppercase; padding: 5px 13px;
    border-radius: 100px; margin-bottom: 18px;
  }
  .eyebrow-pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: blink 2.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px,5vw,44px); font-weight: 400;
    letter-spacing: -.01em; color: var(--navy);
    line-height: 1.15; margin-bottom: 12px;
  }
  .header h1 em { font-style: italic; color: var(--green-dark); }
  .header p { font-size: 15px; color: var(--text-soft); line-height: 1.65; max-width: 520px; }

  /* Progress */
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 11.5px; font-weight: 600; color: var(--slate-light);
    letter-spacing: .05em; margin-bottom: 7px;
  }
  .progress-track {
    height: 3px; background: var(--border);
    border-radius: 100px; overflow: hidden; margin-bottom: 32px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #00E5B0);
    border-radius: 100px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  .section-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--slate);
    background: var(--white); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 13px; margin-bottom: 14px;
  }

  /* Card */
  .q-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px 30px 28px;
    box-shadow: 0 1px 10px rgba(12,28,48,.04);
    animation: up .3s cubic-bezier(.4,0,.2,1) both;
    margin-bottom: 8px;
  }
  @keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

  .q-num { font-size: 11px; font-weight: 700; letter-spacing:.08em; text-transform:uppercase; color:var(--green-dark); margin-bottom:8px; }
  .q-text { font-family:'Instrument Serif',serif; font-size:clamp(17px,2.6vw,22px); font-weight:400; color:var(--navy); line-height:1.35; margin-bottom:5px; }
  .q-hint { font-size:13px; color:var(--text-soft); line-height:1.55; margin-bottom:24px; }

  /* Options */
  .opts { display:flex; flex-direction:column; gap:9px; }

  .opt {
    display:flex; align-items:flex-start; gap:13px;
    padding:14px 17px; border:1.5px solid var(--border);
    border-radius:12px; background:var(--bg); cursor:pointer;
    text-align:left; font-family:inherit;
    transition:border-color .15s,background .15s,transform .12s,box-shadow .15s;
    width:100%;
  }
  .opt:hover { border-color:var(--green); background:var(--green-pale); transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,200,150,.1); }
  .opt.selected { border-color:var(--green); background:var(--green-pale); }

  .opt-radio {
    width:18px; height:18px; border-radius:50%;
    border:2px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    margin-top:2px; transition:border-color .15s;
  }
  .opt:hover .opt-radio, .opt.selected .opt-radio { border-color:var(--green); }
  .opt.selected .opt-radio::after { content:''; width:8px; height:8px; border-radius:50%; background:var(--green); display:block; }

  .opt-body { flex:1; }
  .opt-label { font-size:14px; font-weight:600; color:var(--navy); line-height:1.35; display:block; margin-bottom:2px; }
  .opt-sub   { font-size:12px; font-weight:400; color:var(--slate); line-height:1.4; }

  /* Nav */
  .nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
  .back-btn {
    background:none; border:none; font-family:inherit;
    font-size:13px; font-weight:600; color:var(--slate-light);
    cursor:pointer; display:flex; align-items:center; gap:5px;
    padding:6px 0; transition:color .15s;
  }
  .back-btn:hover { color:var(--green-dark); }

  .next-btn {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--green); color:#002A1D; border:none;
    border-radius:100px; padding:12px 24px;
    font-family:inherit; font-size:14px; font-weight:700;
    cursor:pointer; transition:background .15s,transform .12s,opacity .15s;
  }
  .next-btn:disabled { opacity:.35; cursor:not-allowed; }
  .next-btn:not(:disabled):hover { background:var(--green-dark); transform:translateY(-1px); }
  .next-btn-wrap { display:flex; justify-content:flex-end; margin-top:20px; }

  /* ── Results ── */
  .results-wrap { animation:up .4s cubic-bezier(.4,0,.2,1) both; }

  .results-heading {
    font-family:'Instrument Serif',serif;
    font-size:clamp(24px,4vw,36px); font-weight:400;
    color:var(--navy); margin-bottom:6px; line-height:1.2;
  }
  .results-sub { font-size:14px; color:var(--text-soft); margin-bottom:32px; line-height:1.55; }

  /* Summary bar */
  .summary-bar { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:28px; }
  .summary-cell {
    background:var(--white); border:1px solid var(--border);
    border-radius:14px; padding:20px 16px; text-align:center;
  }
  .summary-product { font-size:10px; font-weight:700; color:var(--slate-light); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
  .summary-score { font-family:'Instrument Serif',serif; font-size:36px; font-weight:400; line-height:1; margin-bottom:8px; }
  .sc-yoid { color:var(--yoid); }
  .sc-yoma { color:var(--yoma-dark); }
  .sc-ex   { color:var(--ex-dark); }

  .fit-badge {
    display:inline-flex; align-items:center; gap:5px;
    font-size:10.5px; font-weight:700; letter-spacing:.07em;
    text-transform:uppercase; padding:4px 10px; border-radius:100px;
  }
  .fit-strong   { background:var(--strong-bg); color:var(--strong); }
  .fit-good     { background:var(--good-bg);   color:var(--good); }
  .fit-moderate { background:var(--mod-bg);    color:var(--mod); }
  .fit-no       { background:var(--no-bg);     color:var(--no); }

  /* Product cards */
  .product-card {
    background:var(--white); border:1px solid var(--border);
    border-radius:18px; overflow:hidden; margin-bottom:20px;
    box-shadow:0 2px 12px rgba(12,28,48,.05);
  }

  .product-hero { padding:28px 30px 24px; position:relative; overflow:hidden; }
  .product-hero::after {
    content:''; position:absolute; right:-60px; top:-60px;
    width:240px; height:240px; border-radius:50%; opacity:.12;
  }
  .hero-yoid { background:#1A1060; }
  .hero-yoid::after { background:var(--yoid); }
  .hero-yoma { background:#002E20; }
  .hero-yoma::after { background:var(--green); }
  .hero-exchange { background:#3A1F00; }
  .hero-exchange::after { background:var(--ex); }

  .product-badge {
    display:inline-flex; align-items:center; gap:6px;
    font-size:10.5px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; padding:4px 11px;
    border-radius:100px; margin-bottom:14px;
  }
  .badge-yoid     { background:rgba(108,99,255,.25); color:#BDB5FF; border:1px solid rgba(108,99,255,.4); }
  .badge-yoma     { background:rgba(0,200,150,.2);   color:#6DFAD9; border:1px solid rgba(0,200,150,.35); }
  .badge-exchange { background:rgba(245,158,11,.2);  color:#FCD47A; border:1px solid rgba(245,158,11,.35); }

  .hero-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; position:relative; }
  .product-name { font-family:'Instrument Serif',serif; font-size:clamp(24px,4vw,34px); font-weight:400; color:#fff; line-height:1.1; margin-bottom:8px; }
  .product-tagline { font-size:14px; color:rgba(255,255,255,.62); line-height:1.55; max-width:480px; }
  .hero-score { flex-shrink:0; text-align:right; }
  .hero-score-label { font-size:11px; font-weight:700; color:rgba(255,255,255,.45); letter-spacing:.06em; text-transform:uppercase; margin-bottom:4px; }
  .hero-score-num   { font-family:'Instrument Serif',serif; font-size:44px; font-weight:400; color:#fff; line-height:1; }

  .product-body { padding:24px 30px 28px; }

  .score-section {
    background:var(--bg); border:1px solid var(--border);
    border-radius:12px; padding:18px 20px; margin-bottom:22px;
  }
  .score-section-label { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--slate-light); margin-bottom:14px; }
  .score-row { margin-bottom:11px; }
  .score-row:last-child { margin-bottom:0; }
  .score-dim-label { font-size:12px; font-weight:600; color:var(--navy); display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .score-dim-label span { color:var(--slate-light); font-weight:400; font-size:11px; }
  .score-bar-track { background:var(--border); border-radius:100px; height:5px; overflow:hidden; }
  .score-bar-fill  { height:100%; border-radius:100px; transition:width 1s cubic-bezier(.4,0,.2,1) .3s; }

  .gate-alert {
    display:flex; align-items:flex-start; gap:10px;
    padding:13px 15px; border-radius:10px;
    font-size:13px; line-height:1.5; margin-bottom:10px;
  }
  .gate-block { background:#FEE2E2; color:#7F1D1D; border:1px solid #FCA5A5; }
  .gate-warn  { background:#FEF3C7; color:#78350F; border:1px solid #FCD34D; }
  .gate-ok    { background:var(--strong-bg); color:#14532D; border:1px solid #86EFAC; }
  .gate-icon  { font-size:15px; flex-shrink:0; margin-top:1px; }

  .body-label { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--slate-light); margin-bottom:12px; }

  .why-list, .cant-list { display:flex; flex-direction:column; gap:8px; margin-bottom:0; }
  .why-item, .cant-item { display:flex; align-items:flex-start; gap:10px; font-size:13.5px; line-height:1.5; color:var(--text); }
  .why-tick { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
  .tick-yoid { background:var(--yoid-pale); color:var(--yoid); }
  .tick-yoma { background:var(--yoma-pale); color:var(--yoma-dark); }
  .tick-ex   { background:var(--ex-pale);   color:var(--ex-dark); }
  .cant-x { width:18px; height:18px; border-radius:50%; background:#FEE2E2; color:#DC2626; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; margin-top:2px; }
  .cant-item { color:var(--slate); }

  hr.divider { border:none; border-top:1px solid var(--border); margin:18px 0; }

  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .info-cell { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:13px 14px; }
  .info-cell-label { font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--slate-light); margin-bottom:5px; }
  .info-cell-val   { font-size:13px; font-weight:600; color:var(--navy); line-height:1.4; }

  .also-box { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px 16px; font-size:13px; color:var(--text-soft); line-height:1.6; margin-bottom:22px; }
  .also-box strong { color:var(--navy); font-weight:600; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
  .chip { font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:100px; border:1px solid; }
  .chip-yoid { background:var(--yoid-pale); color:var(--yoid);     border-color:var(--yoid-border); }
  .chip-yoma { background:var(--yoma-pale); color:var(--yoma-dark);border-color:var(--yoma-border); }
  .chip-ex   { background:var(--ex-pale);   color:var(--ex-dark);  border-color:var(--ex-border); }

  .cta-row { display:flex; gap:10px; flex-wrap:wrap; }
  .cta-p {
    display:inline-flex; align-items:center; gap:7px;
    padding:12px 22px; border-radius:100px;
    font-family:inherit; font-size:14px; font-weight:700;
    cursor:pointer; text-decoration:none; border:none;
    transition:transform .15s,box-shadow .15s;
  }
  .cta-p:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,.1); }
  .cta-yoid { background:var(--yoid); color:#fff; }
  .cta-yoma { background:var(--green); color:#002A1D; }
  .cta-ex   { background:var(--ex);   color:#3A1F00; }
  .cta-s {
    display:inline-flex; align-items:center; gap:7px;
    padding:12px 20px; border-radius:100px;
    font-family:inherit; font-size:14px; font-weight:600;
    cursor:pointer; background:var(--bg); border:1.5px solid var(--border);
    color:var(--text-soft); transition:border-color .15s,color .15s;
  }
  .cta-s:hover { border-color:var(--slate); color:var(--navy); }

  .restart-row { text-align:center; margin-top:36px; }
  .restart-btn { background:none; border:none; font-family:inherit; font-size:13px; color:var(--slate-light); cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:color .15s; padding:4px 0; }
  .restart-btn:hover { color:var(--green-dark); }

  .combo-banner {
    background: linear-gradient(135deg, #002E20, #1A1060);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,.08);
  }
  .combo-title { font-family:'Instrument Serif',serif; font-size:20px; color:#fff; margin-bottom:6px; }
  .combo-sub   { font-size:13px; color:rgba(255,255,255,.6); line-height:1.55; margin-bottom:14px; }
  .combo-chips { display:flex; flex-wrap:wrap; gap:8px; }

  @media (max-width:500px) {
    .shell { padding:32px 16px 60px; }
    .q-card,.product-body,.product-hero { padding-left:18px; padding-right:18px; }
    .info-grid { grid-template-columns:1fr; }
    .summary-bar { grid-template-columns:1fr; }
    .cta-row { flex-direction:column; }
    .hero-top { flex-direction:column; }
    .hero-score { text-align:left; }
  }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="eyebrow"><div class="eyebrow-pip"></div>Partner Product Navigator</div>
    <h1>Find your <em>right</em><br>Yoma product</h1>
    <p>Answer 9 questions and we'll score your fit across all three Yoma products — giving you a tailored recommendation with readiness insights and next steps.</p>
  </div>

  <div id="app"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   QUESTIONS  (9 total, refined per feedback)
══════════════════════════════════════════════ */
const QS = [
  {
    id:"q1", section:"Strategic Objective", num:"Question 1 of 9",
    text:"What is your primary objective?",
    hint:"Choose the option that best reflects your core programme goal. This is the most important question in the assessment.",
    opts:[
      { label:"Issue & verify credentials",
        sub:"Portable, immutable and privacy-preserving credentials / proof of achievements for youth" },
      { label:"Youth engagement",
        sub:"Connect youth in my ecosystem to learning and earning opportunities" },
      { label:"Youth reach",
        sub:"Drive more youth to our existing platform" },
      { label:"Simplify donor reporting",
        sub:"Aggregated, trusted impact data for funders" },
      { label:"Outcome-based financing",
        sub:"Link funding disbursements and payments to youth to verified impact results" },
      { label:"Cost & time-efficient youth matching",
        sub:"Access verified anonymised youth data and match them to our opportunities (learning / earning / impact)" },
      { label:"End-to-end youth ecosystem",
        sub:"Full programme: engage youth, issue credentials, and match them to paid impact opportunities" }
    ]
  },
  {
    id:"q2", section:"Data & Reporting", num:"Question 2 of 9",
    text:"What level of data do you require?",
    hint:"Think about your most demanding data or reporting audience — a donor, a government ministry, or internal M&E.",
    opts:[
      { label:"Basic aggregated participation data",
        sub:"Headcounts, completion rates, aggregated demographic data" },
      { label:"M&E reporting",
        sub:"Advanced monitoring & evaluation for programme quality (Theory of Change + log frame)" },
      { label:"Access to verified youth data",
        sub:"E.g. verified education level, KYC, skills — to match youth efficiently to opportunities" }
    ]
  },
  {
    id:"q3", section:"Existing Platform", num:"Question 3 of 9",
    text:"Do you have an existing youth platform?",
    hint:"This tells us whether you need a hosted solution or an integration layer.",
    opts:[
      { label:"Yes — Learning Management System (LMS)",
        sub:"An existing digital platform for hosting and tracking learning content" },
      { label:"Yes — Jobs or employment platform",
        sub:"An existing platform for job listings, employer matching, or workforce management" },
      { label:"No platform",
        sub:"Working in the youth skilling or engagement sector, but without a digital platform" }
    ]
  },
  {
    id:"q4", section:"Technical Readiness", num:"Question 4 of 9",
    text:"What is your internal engineering capacity?",
    hint:"Be honest — this directly affects which products are feasible for you now vs. later.",
    opts:[
      { label:"Strong",
        sub:"Backend and frontend engineers available for integration work" },
      { label:"Limited",
        sub:"Basic engineering / integration capabilities (API, SSO, etc.)" },
      { label:"None",
        sub:"No technical development capacity" }
    ]
  },
  {
    id:"q5", section:"Verification Model", num:"Question 5 of 9",
    text:"How do you currently verify if a young person completed an activity — or how do you access verified youth data?",
    hint:"Select the method closest to your current or planned approach.",
    opts:[
      { label:"We don't verify completions or youth data",
        sub:"No formal verification process in place" },
      { label:"Manual verification",
        sub:"Staff review and approve completions — strong human oversight component" },
      { label:"Third-party providers",
        sub:"E.g. education level, criminal record, KYC via external data providers" },
      { label:"LMS back-end data",
        sub:"Youth complete courses on our LMS — access to back-end completion data" },
      { label:"Youth upload or share evidence",
        sub:"Photos, documents, geo-tagging collected as proof of completion" },
      { label:"AI-assisted verification",
        sub:"Automated review of evidence with human oversight" }
    ]
  },
  {
    id:"q6", section:"Budget Readiness", num:"Question 6 of 9",
    text:"Do you have budget to support tech enablement for your programme or initiative?",
    hint:"This covers platform subscriptions, integration costs, and ongoing hosting.",
    opts:[
      { label:"Yes — tech budget allocated",
        sub:"Budget confirmed for technological enablement and platform costs" },
      { label:"Possibly — depends on value alignment",
        sub:"Would require a clear business case and value demonstration" },
      { label:"No — no budget available",
        sub:"No recurring subscription or integration costs are possible" }
    ]
  },
  {
    id:"q7", section:"Time & Onboarding Commitment", num:"Question 7 of 9",
    text:"What is your time commitment for Yoma-related integration, engineering, or onboarding?",
    hint:"This helps us understand your deployment readiness. Select the option that reflects what you can realistically commit to.",
    opts:[
      { label:"1–2 week light digital tool onboarding",
        sub:"Minimal technical work — suited to hosted platforms with low integration needs" },
      { label:"1–2 week engineering sprint",
        sub:"API or SDK integration with a backend engineer available" },
      { label:"1–3 month onboarding with M&E capacity",
        sub:"Strong M&E team, clear Theory of Change, and defined impact framework required" }
    ]
  },
  {
    id:"q8", section:"Youth Incentives", num:"Question 8 of 9",
    text:"Are you interested in rewarding or incentivising youth participation — and do you have budget for this?",
    hint:"E.g. ambassador programmes, remuneration for impact activities, or ZLTO reward tokens.",
    opts:[
      { label:"Yes — rewards or incentives budget available",
        sub:"Budget allocated or planned for youth incentives or remuneration" },
      { label:"No — not at this time",
        sub:"No incentives budget in the current plan" }
    ]
  },
  {
    id:"q9", section:"Partner Persona", num:"Question 9 of 9",
    text:"Which partner type best describes your organisation?",
    hint:"This helps us contextualise your recommendation with relevant use cases.",
    opts:[
      { label:"UNICEF Country Office",
        sub:"Running youth programmes at country or regional level" },
      { label:"Government Ministry or Agency",
        sub:"National-scale programme delivery or policy-level digital infrastructure" },
      { label:"Employer or Private Sector",
        sub:"Hiring youth talent, CSR/ESG reporting, or workforce development" },
      { label:"Learning Provider or LMS",
        sub:"Issuing certificates, hosting content, or driving learner enrolment" },
      { label:"Impact Off-taker or Donor",

/* ══════════════════════════════════════════════
   READINESS GATES
══════════════════════════════════════════════ */
function buildGates(ans) {
  const g = { yoid:[], yoma:[], exchange:[] };

  // YoID gates
  if (ans.q6 === 2) g.yoid.push({ type:"block", msg:"No tech budget available. YoID requires a monthly subscription and a one-time integration sprint. Resolve budget before proceeding." });
  else if (ans.q6 === 1) g.yoid.push({ type:"warn", msg:"Budget not confirmed. Build a clear business case for the YoID subscription — the primary ongoing cost is identity services, not content." });
  if (ans.q4 === 2) g.yoid.push({ type:"warn", msg:"No engineering capacity. YoID requires approximately 1 week of backend engineering. Consider outsourcing the integration sprint to a technical partner." });
  if (ans.q7 === 0) g.yoid.push({ type:"warn", msg:"Light onboarding commitment may be insufficient. YoID typically requires a ½–1 week engineering sprint to connect to your platform." });
  if (ans.q4 >= 1 && ans.q6 === 0) g.yoid.push({ type:"ok", msg:"Budget confirmed and engineering available. You are well-positioned for a YoID integration sprint." });

  // yoma.world gates
  if (ans.q4 === 2) g.yoma.push({ type:"ok", msg:"No engineering needed. yoma.world is a fully hosted platform — partners can onboard and post opportunities without any development work." });
  if (ans.q2 === 1) g.yoma.push({ type:"warn", msg:"yoma.world provides basic participation dashboards, not advanced M&E. For full Theory of Change or log frame reporting, pair with the Impacts Exchange." });
  if (ans.q8 === 0) g.yoma.push({ type:"ok", msg:"Incentives budget available. You can use ZLTO rewards on yoma.world to motivate youth participation and ambassador engagement." });

  // Exchange gates
  if (ans.q6 === 2) g.exchange.push({ type:"block", msg:"No budget available. The Impacts Exchange has higher upfront costs: MERL framework design, verification tooling, and governance setup. This product is not feasible without a tech and programme budget." });
  if (ans.q9 === 2) g.exchange.push({ type:"warn", msg:"As an employer or jobs platform, the Impacts Exchange is unlikely to be your primary fit. The Exchange is designed for impact gig programmes (e.g. tree planting, waste mapping, data collection) — not job posting or workforce placement. YoID and yoma.world are more relevant for your goals." });
  if (ans.q3 === 1) g.exchange.push({ type:"warn", msg:"Partners with existing jobs or employment platforms typically use YoID to access verified youth data, and yoma.world to extend their reach. The Impacts Exchange is suited to impact activity programmes, not job placement or employer hiring flows." });
  if (ans.q7 !== 2) g.exchange.push({ type:"warn", msg:"The Impacts Exchange requires a 1–3 month onboarding runway with a defined Theory of Change and impact framework. Ensure your team can commit to this before starting." });
  if (ans.q5 === 1 || ans.q5 === 5) g.exchange.push({ type:"ok", msg:"Your verification approach (manual or AI-assisted) is compatible with the Impacts Exchange, which supports both human and AI-assisted verification workflows." });
  if (ans.q5 === 0) g.exchange.push({ type:"warn", msg:"No current verification process. The Impacts Exchange requires a clearly defined impact framework and verification logic as a prerequisite to deployment." });

  return g;
}

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let step = 0;
let answers = {};
let history = [];

/* ══════════════════════════════════════════════
   SCORING HELPERS
══════════════════════════════════════════════ */
function idx(key) { return key==='yoid'?0:key==='yoma'?1:2; }

function calcScores() {
  let s = { yoid:0, yoma:0, exchange:0 };
  for (const [qid, aidx] of Object.entries(answers)) {
    const d = SCORES[qid]?.[aidx];
    if (d) { s.yoid += d[0]; s.yoma += d[1]; s.exchange += d[2]; }
  }
  return { yoid:Math.max(0,Math.min(100,s.yoid)), yoma:Math.max(0,Math.min(100,s.yoma)), exchange:Math.max(0,Math.min(100,s.exchange)) };
}

function fitLevel(score) {
  if (score >= 75) return { label:"Strong Fit",    cls:"fit-strong" };
  if (score >= 50) return { label:"Good Fit",      cls:"fit-good" };
  if (score >= 30) return { label:"Moderate Fit",  cls:"fit-moderate" };
  return             { label:"Not Recommended", cls:"fit-no" };
}

// Dimensional sub-scores (strategic / technical / cost)
function dimScores(key) {
  const ki = idx(key);
  const strategic = (SCORES.q1[answers.q1]?.[ki]||0) + (SCORES.q2[answers.q2]?.[ki]||0);
  const technical = (SCORES.q3[answers.q3]?.[ki]||0) + (SCORES.q4[answers.q4]?.[ki]||0) + (SCORES.q5[answers.q5]?.[ki]||0);
  const cost      = (SCORES.q6[answers.q6]?.[ki]||0) + (SCORES.q7[answers.q7]?.[ki]||0) + (SCORES.q8[answers.q8]?.[ki]||0);
  // Normalise to 0-100 per dimension
  const sMax=60, tMax=55, cMax=55;
  return {
    s: Math.max(0,Math.min(100,Math.round((strategic/sMax)*100))),
    t: Math.max(0,Math.min(100,Math.round((technical/tMax)*100))),
    c: Math.max(0,Math.min(100,Math.round((cost/cMax)*100)))
  };
}

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function pct() { return Math.round((step / QS.length) * 100); }

function renderProgress() {
  return `
    <div class="progress-meta"><span>Question ${step+1} of ${QS.length}</span><span>${pct()}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct()}%"></div></div>
  `;
}

function renderQuestion() {
  const q = QS[step];
  const sel = answers[q.id];
  const optsHtml = q.opts.map((o,i) => `
    <button class="opt${sel===i?' selected':''}" onclick="selectOpt(${i})">
      <div class="opt-radio"></div>
      <div class="opt-body">
        <span class="opt-label">${o.label}</span>
        <span class="opt-sub">${o.sub}</span>
      </div>
    </button>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="nav">
      ${step>0 ? `<button class="back-btn" onclick="goBack()">← Back</button>` : `<div></div>`}
    </div>
    ${renderProgress()}
    <div class="section-pill">${q.section}</div>
    <div class="q-card">
      <div class="q-num">${q.num}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="opts">${optsHtml}</div>
    </div>
    <div class="next-btn-wrap">
      <button class="next-btn" onclick="nextStep()" ${sel!==undefined?'':'disabled'}>
        ${step < QS.length-1 ? 'Next question →' : 'See my results →'}
      </button>
    </div>
  `;
}

function selectOpt(i) {
  answers[QS[step].id] = i;
  renderQuestion();
}

function nextStep() {
  if (answers[QS[step].id] === undefined) return;
  history.push(step);
  step++;
  if (step >= QS.length) renderResults();
  else renderQuestion();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function goBack() {
  if (!history.length) return;
  step = history.pop();
  renderQuestion();
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ══════════════════════════════════════════════
   RESULTS
══════════════════════════════════════════════ */
function renderResults() {
  const raw = calcScores();
  const gates = buildGates(answers);

  // Apply hard blocks — cap score below "Moderate" threshold
  const display = { ...raw };
  if (gates.yoid.some(g=>g.type==='block'))     display.yoid     = Math.min(display.yoid, 28);
  if (gates.exchange.some(g=>g.type==='block')) display.exchange = Math.min(display.exchange, 28);

  const fits = {
    yoid:     fitLevel(display.yoid),
    yoma:     fitLevel(display.yoma),
    exchange: fitLevel(display.exchange)
  };

  const combo = getCombination(display);

  const summaryHtml = `
    <div class="summary-bar">
      ${['yoid','yoma','exchange'].sort((a,b) => display[b] - display[a]).map((k,i) => `

          <span class="fit-badge ${fits[k].cls}">${fits[k].label}</span>
        </div>
      `).join('')}
    </div>
  `;

  const comboHtml = combo ? `
    <div class="combo-banner">
      <div class="combo-title">✦ Recommended combination: ${combo.title}</div>
      <div class="combo-sub">${combo.sub}</div>

    </div>
  ` : '';

  const productOrder = ['yoid','yoma','exchange'].sort((a,b) => display[b] - display[a]);
  const cards = productOrder.map(k => renderCard(k, display[k], gates[k], fits[k])).join('');

  document.getElementById('app').innerHTML = `
    <div class="nav">
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>
    <div class="results-wrap">
      <div class="progress-meta"><span>Complete</span><span>100%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
      <div class="results-heading">Your product fit results</div>
      <div class="results-sub">Scores are out of 100. Products with unresolved readiness blockers have been capped. Review the fit level, readiness breakdown, and gate alerts for each product below.</div>
      ${summaryHtml}
      ${comboHtml}
      ${cards}
      <div class="restart-row">
        <button class="restart-btn" onclick="restart()">↺ Start over with different answers</button>
      </div>
    </div>
  `;
}

          </div>
        </div>

        ${gatesHtml ? `<div style="margin-bottom:18px">${gatesHtml}</div>` : ''}

        <div style="margin-bottom:20px">
          <div class="body-label">What this product can do for you</div>
          <div class="why-list">${whyHtml}</div>
        </div>

        <hr class="divider">

        <div style="margin-bottom:20px">
          <div class="body-label">What this product does not do</div>
          <div class="cant-list">${cantHtml}</div>
        </div>

        <hr class="divider">

        <div class="info-grid">
          <div class="info-cell">
            <div class="info-cell-label">Integration effort</div>
            <div class="info-cell-val">${p.cost.integration}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Primary cost driver</div>
            <div class="info-cell-val">${p.cost.design}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Subscription / platform</div>
            <div class="info-cell-val">${p.cost.subscription}</div>
          </div>
          <div class="info-cell">
            <div class="info-cell-label">Est. deployment time</div>
            <div class="info-cell-val">${p.deployment}</div>
          </div>
        </div>

        <div class="also-box">
          ${p.also.text}
          <div class="chips">${chipHtml}</div>
        </div>

        <div class="cta-row">
          <a href="${p.cta.url}" target="_blank" class="cta-p cta-${tc==='exchange'?'ex':tc}">${p.cta.label} →</a>
          <button class="cta-s" onclick="restart()">↺ Start over</button>
        </div>
      </div>
    </div>
  `;
}

function restart() {
  step = 0; answers = {}; history = [];
  renderQuestion();
  window.scrollTo({ top:0, behavior:'smooth' });
}

renderQuestion();
</script>
</body>
</html>
